name: Tauri Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: windows-latest
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mall/web build
      - name: Tauri desktop build (best effort)
        id: tauri_build
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop-tauri
          tagName: ${{ github.ref_name }}
          releaseName: Mall SuperApp ${{ github.ref_name }}
          releaseBody: Automated Tauri desktop release.
          includeDebug: false
          includeUpdaterJson: true

      - name: Generate fallback note when tauri build fails
        if: steps.tauri_build.outcome != 'success'
        run: |
          cat << 'EOF' > tauri-build-note-${{ matrix.platform }}.txt
          [fallback] Tauri build failed on platform: ${{ matrix.platform }}
          The release workflow keeps running to avoid blocking main delivery.
          Please inspect the failed job logs and retry with the same tag.
          EOF

      - name: Upload tauri fallback note
        if: steps.tauri_build.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-note-${{ matrix.platform }}
          path: tauri-build-note-${{ matrix.platform }}.txt
