name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:

jobs:
  web-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mall/web build
      - run: pnpm --filter @mall/web test
      - run: pnpm --filter @mall/store test
      - run: pnpm --filter @mall/web exec playwright install --with-deps chromium
      - run: pnpm --filter @mall/web e2e
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  mobile-build-node20:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build mobile (best effort)
        id: mobile_build
        continue-on-error: true
        run: |
          rm -rf apps/mobile/dist
          pnpm --filter @mall/mobile build
      - name: Package mobile artifact or fallback note
        run: |
          if [ -d apps/mobile/dist ]; then
            echo "MOBILE_ARTIFACT=apps/mobile/dist" >> $GITHUB_ENV
          else
            echo "Mobile build failed under current CI environment. Please check logs and retry with pinned Node 20 + lockfile refresh." > mobile-build-note.txt
            echo "MOBILE_ARTIFACT=mobile-build-note.txt" >> $GITHUB_ENV
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-weapp-dist
          path: ${{ env.MOBILE_ARTIFACT }}
